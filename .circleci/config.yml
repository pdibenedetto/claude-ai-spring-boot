version: 2.1

jobs:
  build:
    docker:
      - image: cimg/openjdk:17.0
    steps:
      - checkout
      - run:
          name: Install Maven
          command: sudo apt-get update && sudo apt-get install -y maven
      - run:
          name: Run tests
          command: mvn -B test
      - run:
          name: Build Docker image
          command: docker build -t claude-ai-spring-boot:${CIRCLE_SHA1} .
      - run:
          name: Push Docker image
          command: |
            echo $DOCKERHUB_PASSWORD | docker login -u $DOCKERHUB_USERNAME --password-stdin
            docker push claude-ai-spring-boot:${CIRCLE_SHA1}
workflows:
  version: 2
  build_and_deploy:
    jobs:
      - build
