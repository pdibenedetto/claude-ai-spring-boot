version: 2.1

jobs:
  build:
    docker:
      - image: circleci/openjdk:21-jre
    steps:
      - checkout
      - run:
          name: Set up Maven
          command: |
            sudo apt-get update
            sudo apt-get install -y maven
      - run:
          name: Build with Maven
          command: mvn clean package -DskipTests
      - run:
          name: Run Tests
          command: mvn test
      - run:
          name: Build Docker Image
          command: |
            docker build -t claude-ai-spring-boot .
      - run:
          name: Test Docker Image
          command: |
            docker run -d --name test-app -p 8080:8080 claude-ai-spring-boot
            sleep 10
            docker stop test-app

workflows:
  version: 2
  build_and_test:
    jobs:
      - build
