server:
  port: 8080

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/persondb
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  sql:
    init:
      mode: always

app:
  jwt-secret: mySecretKeymySecretKeymySecretKeymySecretKeymySecretKeymySecretKeymySecretKeymySecretKey
  jwt-expiration-milliseconds: 86400000

logging:
  level:
    org.springframework.security: DEBUG
    pl.piomin.services: DEBUG